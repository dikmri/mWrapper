name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest

      - name: Build package
        run: python -m build --outdir release

      - name: Build Windows exe
        shell: pwsh
        run: .\scripts\build_exe.ps1 -ZipName "mWrapper-${{ github.ref_name }}-windows.zip" -ReleaseDir "release"

      - name: Write release notes
        shell: pwsh
        run: |
          $notes = @(
            "# mWrapper $env:GITHUB_REF_NAME"
            ""
            "このリリースには Python wheel と source distribution を添付しています。"
            ""
            "## インストール"
            ""
            '```powershell'
            'powershell -NoProfile -ExecutionPolicy Bypass -Command "irm https://raw.githubusercontent.com/dikmri/mWrapper/main/scripts/install.ps1 | iex"'
            '```'
            ""
            "zip を手動で展開する場合は `mWrapper-$env:GITHUB_REF_NAME-windows.zip` をダウンロードし、中の `mWrapper.exe` を起動してください。"
          )
          $utf8NoBom = [System.Text.UTF8Encoding]::new($false)
          [System.IO.File]::WriteAllLines((Join-Path $PWD "release_notes.md"), $notes, $utf8NoBom)

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $files = Get-ChildItem -LiteralPath release -File | ForEach-Object { $_.FullName }
          gh release create "${{ github.ref_name }}" $files --title "mWrapper ${{ github.ref_name }}" --notes-file release_notes.md
